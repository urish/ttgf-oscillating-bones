# Tiny Tapeout project information
project:
  title:        "Oscillating Bones"      # Project title
  author:       "Uri Shaked"      # Your name
  discord:      "urish"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A stylish SkullFET ring oscillator (~120 MHz) with an 8-bit /2../256 divider"      # One line description of what your project does
  language:     "Analog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2, 3x2, 4x2

  # How many analog pins does your project use?
  analog_pins: 1        # Valid values: 0 to 6
  uses_vapwr: false     # Set to true to request the second analog supply (VAPWR). The ring
                        # runs directly on the 3.3V core (VDPWR), so no second supply needed.

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_oscillating_bones"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs (8-bit divider, LSB first)
  uo[0]: "osc_div_2"
  uo[1]: "osc_div_4"
  uo[2]: "osc_div_8"
  uo[3]: "osc_div_16"
  uo[4]: "osc_div_32"
  uo[5]: "osc_div_64"
  uo[6]: "osc_div_128"
  uo[7]: "osc_div_256"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  ua[0]: "osc_out"
  ua[1]: ""
  ua[2]: ""
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
